name: Release to PyPI

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    name: linux-${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64
            runner: ubuntu-latest
          - target: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout matterbridge
        uses: actions/checkout@v6
        with:
          path: matterbridge

      - name: Checkout private rmb (sibling dir for the path dependency)
        uses: actions/checkout@v6
        with:
          repository: 3735943886/rust-matter-bridge
          ssh-key: ${{ secrets.RMB_DEPLOY_KEY }}
          path: rust-matter-bridge

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: "2_28"
          working-directory: matterbridge
          args: --release --out dist
          before-script-linux: |
            dnf install -y avahi-devel clang

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-${{ matrix.target }}
          path: matterbridge/dist/*.whl

  windows:
    name: windows-x64
    runs-on: windows-latest
    steps:
      - name: Checkout matterbridge
        uses: actions/checkout@v6
        with:
          path: matterbridge

      - name: Checkout private rmb (sibling dir for the path dependency)
        uses: actions/checkout@v6
        with:
          repository: 3735943886/rust-matter-bridge
          ssh-key: ${{ secrets.RMB_DEPLOY_KEY }}
          path: rust-matter-bridge

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: x64
          working-directory: matterbridge
          args: --release --out dist

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheels-windows-x64
          path: matterbridge/dist/*.whl

  release:
    name: Publish + GitHub Release
    needs: [linux, windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    environment: pypi
    permissions:
      id-token: write
      contents: write
    steps:
      - name: Checkout (full history + tags for changelog)
        uses: actions/checkout@v6
        with:
          fetch-depth: 0
          fetch-tags: true

      - name: Download all wheels
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true

      - name: Generate changelog
        run: |
          CUR="${GITHUB_REF_NAME}"
          PREV=$(git describe --tags --abbrev=0 "${CUR}^" 2>/dev/null || echo "")
          {
            echo "## What's Changed"
            echo
            if [ -n "$PREV" ]; then
              git log --no-merges --pretty='- %s (%h)' "${PREV}..${CUR}"
            else
              git log --no-merges --pretty='- %s (%h)' "${CUR}"
            fi
            echo
            if [ -n "$PREV" ]; then
              echo "**Full Changelog**: ${GITHUB_SERVER_URL}/${GITHUB_REPOSITORY}/compare/${PREV}...${CUR}"
            fi
          } > CHANGELOG_RELEASE.md
          cat CHANGELOG_RELEASE.md

      - name: Create GitHub Release
        uses: softprops/action-gh-release@v2
        with:
          body_path: CHANGELOG_RELEASE.md
          files: dist/*.whl
          fail_on_unmatched_files: true
