name: Release to PyPI

on:
  push:
    tags: ["v*"]
  workflow_dispatch:

permissions:
  contents: read

jobs:
  linux:
    name: linux-${{ matrix.target }}
    runs-on: ${{ matrix.runner }}
    strategy:
      fail-fast: false
      matrix:
        include:
          - target: x86_64
            runner: ubuntu-latest
          - target: aarch64
            runner: ubuntu-24.04-arm
    steps:
      - name: Checkout matterbridge
        uses: actions/checkout@v6
        with:
          path: matterbridge

      - name: Checkout private rmb (sibling dir for the path dependency)
        uses: actions/checkout@v6
        with:
          repository: 3735943886/rust-matter-bridge
          ssh-key: ${{ secrets.RMB_DEPLOY_KEY }}
          path: rust-matter-bridge

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: ${{ matrix.target }}
          manylinux: "2_28"
          working-directory: matterbridge
          args: --release --out dist
          before-script-linux: |
            dnf install -y avahi-devel clang

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheels-linux-${{ matrix.target }}
          path: matterbridge/dist/*.whl

  windows:
    name: windows-x64
    runs-on: windows-latest
    steps:
      - name: Checkout matterbridge
        uses: actions/checkout@v6
        with:
          path: matterbridge

      - name: Checkout private rmb (sibling dir for the path dependency)
        uses: actions/checkout@v6
        with:
          repository: 3735943886/rust-matter-bridge
          ssh-key: ${{ secrets.RMB_DEPLOY_KEY }}
          path: rust-matter-bridge

      - name: Build wheel
        uses: PyO3/maturin-action@v1
        with:
          target: x64
          working-directory: matterbridge
          args: --release --out dist

      - name: Upload artifact
        uses: actions/upload-artifact@v7
        with:
          name: wheels-windows-x64
          path: matterbridge/dist/*.whl

  release:
    name: Publish to PyPI
    needs: [linux, windows]
    runs-on: ubuntu-latest
    if: startsWith(github.ref, 'refs/tags/')
    environment: pypi
    permissions:
      id-token: write
    steps:
      - name: Download all wheels
        uses: actions/download-artifact@v8
        with:
          pattern: wheels-*
          merge-multiple: true
          path: dist

      - name: Publish to PyPI
        uses: pypa/gh-action-pypi-publish@release/v1
        with:
          skip-existing: true
